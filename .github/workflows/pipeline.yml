name: Build and push to ECR

#always starts with on which is used to tell or triiger which branch
on: 
  push:
    branches: ["main"]
  workflow_dispatch:

# hardcode the env variables always
env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: bhimavaram-aqua

  # jobs are like sequnce of steps to follow
jobs:
  build-and-push:
    # strategy is used to build matrix which is a cross os platform makes the code to run on multiple os
    #strategy:
     # matrix:
        #os: [ubuntu-latest, windows-latest, macos-latest]
    #runs-on is used to tell on which os the code need to run
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      #in steps always first pull the code from github for that we use uses:action/checkout@v4
      - name: pull the code from github
        uses: actions/checkout@v4
      - name: pull done
        run:
          echo "pull is successfull"
       # cache block     
      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          # This is the path to your local npm cache
          path: ~/.npm
          # This creates a unique key based on your package-lock.json
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          # If the key doesn't match perfectly, it looks for older versions
          restore-keys: |
            ${{ runner.os }}-node-
      #Now that your runner has pulled the code, it needs permission to talk to your AWS account. We never type passwords directly into this file. Instead, we use the Secrets you stored in GitHub.
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{env.AWS_REGION}}
      
      - name: configure done
        run: echo "configuration successfull"

      - name: login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build, tag and push to ecr
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Starting Docker build for $ECR_REPOSITORY..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          echo "Docker build successful. Image tagged as $IMAGE_TAG."
          
          echo "Pushing image to AWS ECR registry..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "✅ Image successfully pushed to ECR!"
  #Deploying the application in kubernetes
  depoy-to-eks:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: updating kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name aqua-cluster
          echo "updated kube config"
      - name: Update Image Tag and Deploy
        env:
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr_registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|image:.*|image: 720546261973.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}|g" k8s/deployment.yml
          kubectl apply -f k8s/
          echo "✅ Cluster updated with image version: ${{ github.sha }}"
  
      

  
    

   
  
    