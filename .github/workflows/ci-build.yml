name: Continuous Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]   # Tests the build before allowing a merge
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: bhimavaram-aqua
permissions:
      id-token: write # This is required for requesting the JWT
      contents: read  # This is required for actions/checkout

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    outputs:
      tag: ${{ github.sha }} # Saving this for the CD workflow
    steps:
      - uses: actions/checkout@v4

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::720546261973:role/githubactions # Use your Role ARN
          aws-region: ap-south-1
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build an image from Dockerfile
        run: docker build -t bhimavaram-aqua:${{ github.sha }} .

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          # Only push if it's a real merge to main, not a PR test
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          # The Magic Sauce: GitHub Actions Cache
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # THE CONNECTION POINT
  trigger-deploy:
    needs: build-and-push
    # CHANGE: Only run if the build-and-push job was successful AND it's a push to main
    if: github.event_name == 'push' && success()
    uses: ./.github/workflows/cd-deploy.yml
    with:
      image_tag: ${{ needs.build-and-push.outputs.tag }}
    secrets: inherit