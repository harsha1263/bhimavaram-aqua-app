<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhimavaram Aqua Farms | Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans overflow-x-hidden selection:bg-blue-600 selection:text-white">

    <nav class="fixed w-full z-50 bg-white/70 backdrop-blur-xl border-b border-white/20 shadow-sm transition-all duration-500">
        <div class="max-w-7xl mx-auto px-6 lg:px-12">
            <div class="flex justify-between items-center h-24">
                <a href="index.html" class="flex-shrink-0 flex items-center gap-4 cursor-pointer group">
                    <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg group-hover:bg-blue-700 transition-colors duration-500">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <span class="font-extrabold text-2xl text-slate-900 tracking-tight">Bhimavaram<span class="text-blue-600">Aqua</span></span>
                </a>
                
                <div class="hidden md:flex space-x-10 items-center">
                    <a href="index.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 uppercase tracking-widest transition-colors duration-300">Home</a>
                    <a href="store.html" class="text-sm font-bold text-blue-600 uppercase tracking-widest border-b-2 border-blue-600 pb-1">Market</a>
                    <a href="#" class="px-8 py-3.5 bg-slate-900 text-white text-sm font-bold uppercase tracking-widest rounded-full hover:bg-blue-600 hover:shadow-lg transition-all duration-500 hover:-translate-y-1">Cart (0)</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="pt-40 pb-16 bg-white border-b border-slate-100 text-center">
        <h1 class="text-4xl lg:text-5xl font-extrabold text-slate-900 tracking-tight mb-4">Fresh Catch Market</h1>
        <p class="text-lg text-slate-500 max-w-2xl mx-auto font-light">Order premium, export-quality seafood directly from our bio-secure ponds to your business.</p>
    </header>

    <section class="py-16 max-w-7xl mx-auto px-6 lg:px-12">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="product-grid">
            </div>
    </section>

    <script>
        async function loadProducts() {
            try {
                // 1. Ask the server for the database inventory
                const response = await fetch('/api/products');
                const products = await response.json();
                
                const grid = document.getElementById('product-grid');
                grid.innerHTML = ''; // Clear loading state

                // 2. Loop through every product and build a card
                products.forEach(product => {
                    const card = `
                    <div class="bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden group hover:shadow-2xl transition-all duration-300">
                        <div class="h-64 overflow-hidden relative">
                            <img src="${product.image_url}" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <div class="absolute top-4 right-4 ${product.stock_quantity > 0 ? 'bg-blue-600' : 'bg-red-600'} text-white text-xs font-bold px-3 py-1 rounded-full">
                                ${product.stock_quantity > 0 ? 'In Stock (' + product.stock_quantity + 'kg)' : 'Sold Out'}
                            </div>
                        </div>
                        <div class="p-8">
                            <h3 class="text-2xl font-bold text-slate-900 mb-2">${product.name}</h3>
                            <p class="text-slate-500 text-sm mb-6 line-clamp-2">${product.description}</p>
                            <div class="flex justify-between items-center">
                                <span class="text-2xl font-black text-blue-600">$${product.price}<span class="text-sm text-slate-400 font-medium"> / kg</span></span>
                                <button class="px-5 py-2.5 bg-slate-900 text-white font-bold rounded-xl hover:bg-blue-600 transition-colors" ${product.stock_quantity === 0 ? 'disabled' : ''}>
                                    Add to Cart
                                </button>
                            </div>
                        </div>
                    </div>`;
                    grid.innerHTML += card;
                });
            } catch (error) {
                console.error("Failed to load products:", error);
                document.getElementById('product-grid').innerHTML = '<p class="text-red-500 font-bold">Error loading marketplace data. Please try again later.</p>';
            }
        }

        // Run the function as soon as the page loads
        loadProducts();
    </script>
</body>
</html>
